<script src="https://cdn.amcharts.com/lib/4/core.js"></script>
<script src="https://cdn.amcharts.com/lib/4/maps.js"></script>
<script src="https://cdn.amcharts.com/lib/4/geodata/worldLow.js"></script>
<script>
  var chart = am4core.create("map", am4maps.MapChart);
  chart.geodata = am4geodata_worldLow;
  chart.projection = new am4maps.projections.Miller();
  chart.homeZoomLevel = 1;

  var polygonSeries = chart.series.push(new am4maps.MapPolygonSeries());
  polygonSeries.useGeodata = true;
  polygonSeries.exclude = ["AQ"];

  var polygonTemplate = polygonSeries.mapPolygons.template;
  polygonTemplate.fill = am4core.color("#e0e0e0");
  polygonTemplate.stroke = am4core.color("#fff");
  polygonTemplate.strokeWidth = 0.5;
  polygonTemplate.tooltipText = "{name}";

  var hoverState = polygonTemplate.states.create("hover");
  hoverState.properties.fill = am4core.color("#aaa");

  var visitedSeries = chart.series.push(new am4maps.MapPolygonSeries());
  visitedSeries.useGeodata = true;
  visitedSeries.include = ["CA", "US", "JP", "SG", "TH", "MY", "ID"];

  var visitedTemplate = visitedSeries.mapPolygons.template;
  visitedTemplate.fill = am4core.color("#0000ff");
  visitedTemplate.stroke = am4core.color("#fff");
  visitedTemplate.strokeWidth = 0.5;
  visitedTemplate.tooltipText = "{name}";
  visitedTemplate.fillOpacity = 0.85;

  var visitedHover = visitedTemplate.states.create("hover");
  visitedHover.properties.fill = am4core.color("#0000cc");

  chart.zoomControl = new am4maps.ZoomControl();
</script>
