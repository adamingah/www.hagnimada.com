<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function () {
      function celebrate() {
        var fire = function () {
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js';
          s.onload = function () {
            confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });
            setTimeout(function () {
              confetti({ particleCount: 80, spread: 120, origin: { y: 0.4 } });
            }, 300);
          };
          document.head.appendChild(s);
        };
        // The gate runs in <head>; wait for <body> to exist so the
        // confetti canvas has somewhere to attach.
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fire);
        } else {
          fire();
        }
      }
      try {
        if (localStorage.getItem('hagnimada-auth') === 'ok') return;
      } catch (e) { /* localStorage unavailable — fall through to prompt */ }
      while (true) {
        var pw = window.prompt('Password:');
        if (pw === 'adamingah') { /* I know this isn't secure. Lol. */
          try { localStorage.setItem('hagnimada-auth', 'ok'); } catch (e) {}
          celebrate();
          return;
        }
        if (pw === null) {
          document.documentElement.innerHTML = '';
          window.stop();
          return;
        }
      }
    }());
  </script>

  {%- assign page_title = page.title | default: site.title -%}
  {%- assign page_desc = page.description | default: site.description -%}
  {%- assign page_url = page.url | absolute_url -%}

  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_desc }}">
  <meta name="author" content="{{ site.author }}">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page_title }}">
  <meta property="og:description" content="{{ page_desc }}">
  <meta property="og:url" content="{{ page_url }}">
  <meta property="og:image" content="{{ '/favicon.png' | absolute_url }}">
  <meta name="twitter:card" content="summary">

  <link rel="canonical" href="{{ page_url }}">
  <link rel="icon" href="{{ '/favicon.png' | relative_url }}" type="image/png">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
